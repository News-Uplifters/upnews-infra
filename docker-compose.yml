version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: upnews-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/upnews.db
      - LOG_LEVEL=info
    volumes:
      - ./data:/app/data
    networks:
      - upnews-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  pipeline:
    build:
      context: .
      dockerfile: docker/pipeline.Dockerfile
    container_name: upnews-pipeline
    environment:
      - DATABASE_URL=sqlite:///./data/upnews.db
      - CRAWL_INTERVAL_HOURS=4
      - ML_MODEL=distilbert-base-uncased
      - MAX_ARTICLES_PER_FEED=50
    volumes:
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
    networks:
      - upnews-network
    # Run once on startup; use scheduled job in production
    command: python -m upnews_pipeline.crawl

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: upnews-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - upnews-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  db:
    driver: local

networks:
  upnews-network:
    driver: bridge

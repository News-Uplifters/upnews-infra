# UpNews Local Stack
#
# Run from this directory (upnews-infra/) with all repos cloned as siblings:
#
#   parent-dir/
#   ├── upnews-api/
#   ├── upnews-pipeline/
#   ├── upnews-frontend/
#   └── upnews-infra/          <-- run docker compose from here
#
# Quick start:
#   ./scripts/run-local.sh              # full e2e: build → start → crawl → validate
#
# Manual usage:
#   docker compose up --build -d        # start API + frontend
#   docker compose --profile crawl run --rm pipeline   # run one crawl
#   docker compose down -v              # stop + clean volumes

services:
  api:
    build:
      context: ../upnews-api
      dockerfile: Dockerfile
    container_name: upnews-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_DIR=/app/data
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost,http://localhost:3000
    volumes:
      - upnews-data:/app/data
    networks:
      default:
        # Frontend nginx.conf proxies /api/ to "backend:8000"
        # This alias makes "api" reachable as "backend" inside the network
        aliases:
          - backend
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pipeline:
    build:
      context: ../upnews-pipeline
      dockerfile: Dockerfile
    container_name: upnews-pipeline
    environment:
      - DATABASE_PATH=/app/data/upnews.db
      - LOG_LEVEL=INFO
      - ARTICLES_LIMIT_PER_SOURCE=20
      - CLASSIFICATION_THRESHOLD=0.3
      - CLASSIFIER_MODE=rules
    volumes:
      - upnews-data:/app/data
    depends_on:
      api:
        condition: service_healthy
    # Pipeline runs on-demand — not auto-started with `docker compose up`
    profiles:
      - crawl

  frontend:
    build:
      context: ../upnews-frontend
      dockerfile: Dockerfile
    container_name: upnews-frontend
    ports:
      - "3000:80"
    environment: []
    depends_on:
      api:
        condition: service_healthy

volumes:
  upnews-data:
    driver: local

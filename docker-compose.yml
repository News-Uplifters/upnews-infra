version: '3.8'

# Run from the upnews-infra directory:
#   docker-compose up --build
#
# Each service builds from its own repo (sibling directories).
# Shared SQLite database is mounted into both api and pipeline via the
# "db-data" named volume so both services read/write the same file.

services:
  api:
    build:
      context: ../upnews-api      # builds using upnews-api/Dockerfile
      dockerfile: Dockerfile
    container_name: upnews-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=./data/upnews.db
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost:80,http://localhost
    volumes:
      - db-data:/app/data          # shared DB volume
    networks:
      - upnews-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  pipeline:
    build:
      context: ../upnews-pipeline  # builds using upnews-pipeline/Dockerfile
      dockerfile: Dockerfile
    container_name: upnews-pipeline
    environment:
      - DATABASE_PATH=data/articles.db
      - CRAWL_INTERVAL_HOURS=4
      - MAX_ARTICLES_PER_FEED=50
      - LOG_LEVEL=INFO
    volumes:
      - db-data:/app/data          # shares DB with api
      - pipeline-logs:/app/logs
    depends_on:
      api:
        condition: service_healthy
    networks:
      - upnews-network
    # Runs once on startup; in production use the scheduled GitHub Action
    command: python -m pipeline.run_pipeline

  frontend:
    build:
      context: ../upnews-frontend  # builds using upnews-frontend/Dockerfile
      dockerfile: Dockerfile
    container_name: upnews-frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - upnews-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  db-data:
    driver: local                  # SQLite file shared between api and pipeline
  pipeline-logs:
    driver: local

networks:
  upnews-network:
    driver: bridge

# UpNews Local Stack
#
# Run from this directory (upnews-infra/) with all repos cloned as siblings:
#
#   parent-dir/
#   ├── upnews-api/              # Python FastAPI (legacy, SQLite)
#   ├── upnews-api-rust/         # Rust Axum (new, Postgres)
#   ├── upnews-pipeline/
#   ├── upnews-frontend/
#   └── upnews-infra/            <-- run docker compose from here
#
# Two parallel stacks share the frontend network alias `backend:8000` so the
# React app hits whichever API is currently running. Only ONE API profile
# should be active at a time.
#
# Quick start (legacy Python stack):
#   ./scripts/run-local.sh                                     # Python + SQLite e2e
#
# Quick start (new Rust stack):
#   ./scripts/run-local-rust.sh                                # Rust + Postgres e2e
#
# Manual usage:
#   docker compose --profile python up --build -d             # Python API + frontend
#   docker compose --profile rust   up --build -d             # Rust API + Postgres + frontend
#   docker compose --profile crawl      run --rm pipeline     # one crawl (writes to SQLite)
#   docker compose --profile crawl-rust run --rm pipeline-rust # one crawl (writes to Postgres)
#   docker compose down -v                                     # stop + clean volumes

services:
  # ───────────────────────── Python API (legacy) ─────────────────────────
  api:
    build:
      context: ../upnews-api
      dockerfile: Dockerfile
    container_name: upnews-api
    profiles: ["python"]
    ports:
      - "8000:8000"
    environment:
      - DATABASE_DIR=/app/data
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=http://localhost,http://localhost:3000
    volumes:
      - upnews-data:/app/data
    networks:
      default:
        aliases:
          - backend
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pipeline:
    build:
      context: ../upnews-pipeline
      dockerfile: Dockerfile
    container_name: upnews-pipeline
    profiles: ["crawl"]
    environment:
      - DATABASE_PATH=/app/data/upnews.db
      - LOG_LEVEL=INFO
      - ARTICLES_LIMIT_PER_SOURCE=20
      - CLASSIFICATION_THRESHOLD=0.3
      - CLASSIFIER_MODE=rules
    volumes:
      - upnews-data:/app/data
    depends_on:
      api:
        condition: service_healthy

  # ───────────────────────── Rust API (new) + Postgres ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: upnews-postgres
    profiles: ["rust", "crawl-rust"]
    environment:
      - POSTGRES_USER=upnews
      - POSTGRES_PASSWORD=upnews
      - POSTGRES_DB=upnews
    ports:
      - "5432:5432"
    volumes:
      - upnews-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upnews -d upnews"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  api-rust:
    build:
      context: ../upnews-api-rust
      dockerfile: Dockerfile
    container_name: upnews-api-rust
    profiles: ["rust"]
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://upnews:upnews@postgres:5432/upnews
      - UPNEWS__HOST=0.0.0.0
      - UPNEWS__PORT=8000
      - UPNEWS__LOG_LEVEL=info
      - UPNEWS__LOG_FORMAT=json
      - UPNEWS__CORS_ORIGINS=http://localhost,http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
        aliases:
          - backend
    # The distroless runtime has no shell/curl, so we don't define an in-container
    # healthcheck — run-local-rust.sh polls /api/health from the host instead.

  pipeline-rust:
    build:
      context: ../upnews-pipeline
      dockerfile: Dockerfile
    container_name: upnews-pipeline-rust
    profiles: ["crawl-rust"]
    environment:
      # Pipeline writes directly to Postgres when DATABASE_URL is set.
      # (See upnews-pipeline issue — fallback to SQLite if unset.)
      - DATABASE_URL=postgres://upnews:upnews@postgres:5432/upnews
      - LOG_LEVEL=INFO
      - ARTICLES_LIMIT_PER_SOURCE=20
      - CLASSIFICATION_THRESHOLD=0.3
      - CLASSIFIER_MODE=rules
    depends_on:
      postgres:
        condition: service_healthy

  # ───────────────────────── Frontend (shared) ─────────────────────────
  frontend:
    build:
      context: ../upnews-frontend
      dockerfile: Dockerfile
    container_name: upnews-frontend
    profiles: ["python", "rust"]
    ports:
      - "3000:80"

volumes:
  upnews-data:
    driver: local
  upnews-pgdata:
    driver: local

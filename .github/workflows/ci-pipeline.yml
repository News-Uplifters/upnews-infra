name: CI - Pipeline Service

on:
  push:
    paths:
      - 'pipeline/**'
      - 'docker/pipeline.Dockerfile'
      - '.github/workflows/ci-pipeline.yml'
  pull_request:
    paths:
      - 'pipeline/**'
      - 'docker/pipeline.Dockerfile'
      - '.github/workflows/ci-pipeline.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r pipeline/requirements.txt
          pip install -r pipeline/requirements-dev.txt

      - name: Download spaCy model
        run: python -m spacy download en_core_web_sm

      - name: Lint with ruff check
        run: ruff check pipeline/

      - name: Format check with ruff
        run: ruff format --check pipeline/

      - name: Run tests with pytest (mock feeds only)
        run: |
          pytest pipeline/tests/ -v --cov=pipeline --cov-report=xml -m "not integration"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: pipeline
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/pipeline.Dockerfile
          push: false
          tags: upnews-pipeline:latest

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'pipeline/'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
